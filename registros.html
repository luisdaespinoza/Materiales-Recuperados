<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Producción - Agrozzi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --color-primary: #8a0007; /* Rojo corporativo Agrozzi */
            --color-primary-dark: #660005;
            --color-success: #10b981; /* Verde esmeralda minimalista */
        }
        .text-primary { color: var(--color-primary); }
        .bg-primary { background-color: var(--color-primary); }
        .bg-primary:hover { background-color: var(--color-primary-dark); }
        .border-primary { border-color: var(--color-primary); }
        
        /* Signature Pad Estilizado */
        .signature-pad-container {
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            background-color: #f9fafb;
            position: relative;
        }
        .signature-pad {
            width: 100%;
            height: 130px;
            touch-action: none;
            border-radius: 6px;
        }

        /* Contenedor oculto para renderizar el PDF impreso */
        #pdfContainer {
            position: absolute;
            left: -9999px;
            width: 595.28px; /* Ancho estándar A4 a 72 dpi */
            box-sizing: border-box;
            background-color: white;
            color: #1f2937;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body class="bg-gray-50 min-h-screen font-sans antialiased text-gray-900" onload="startApp()"> 

    <div id="app" class="max-w-md mx-auto bg-white min-h-screen flex flex-col shadow-sm border-x border-gray-100">
        
        <header class="p-5 border-b border-gray-100 flex justify-between items-center bg-white sticky top-0 z-10">
            <div class="flex items-center space-x-3">
                <img src="https://agrozzi.cl/wp-content/uploads/2023/06/footer-19-06-1.png" alt="Logo Agrozzi" class="h-7 w-auto object-contain grayscale tracking-wider">
                <span class="text-xs font-semibold tracking-widest text-gray-400 uppercase">| Pañol</span>
            </div>
            <button id="navBtn" onclick="toggleView()" class="text-xs font-medium text-gray-500 hover:text-gray-900 transition py-1 px-3 border border-gray-200 rounded-full">
                Ver Reportes
            </button>
        </header>

        <main class="p-5 flex-grow space-y-6">
            
            <div id="newRecordView" class="space-y-6">
                <div>
                    <h2 class="text-xl font-light text-gray-800 tracking-tight">Nuevo Registro</h2>
                    <p class="text-xs text-gray-400 mt-1">Ingrese los ítems terminados en su turno.</p>
                </div>

                <div class="space-y-1">
                    <label class="block text-xs font-medium text-gray-500 uppercase tracking-wider">Sitio de Recepción</label>
                    <select id="siteSelector" class="w-full px-3 py-2.5 text-xs bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:border-gray-400 transition text-gray-700">
                        <option value="" disabled selected>Seleccione el lugar de recepción...</option>
                        <option value="Bodega 4">Bodega 4</option>
                        <option value="Bodega 8">Bodega 8</option>
                        <option value="Planta Jugos">Planta Jugos</option>
                        <option value="Oficina pañol">Oficina pañol</option>
                    </select>
                </div>

                <div class="space-y-2 pt-2">
                    <label class="block text-xs font-medium text-gray-500 uppercase tracking-wider">Materiales del Lote</label>
                    <div id="materialsListContainer" class="space-y-4">
                        </div>
                </div>

                <button onclick="addMaterialRow()" class="w-full py-3 border border-dashed border-gray-300 rounded-lg text-xs font-medium text-gray-500 hover:border-gray-400 hover:text-gray-700 transition flex items-center justify-center space-x-1">
                    <span>➕ Agregar Material</span>
                </button>

                <div class="pt-4 border-t border-gray-100 space-y-3">
                    <div class="space-y-1">
                        <label class="block text-xs font-medium text-gray-500 uppercase tracking-wider">Nombre del Supervisor (Recepciona)</label>
                        <input type="text" id="supervisorNameInput" class="w-full px-3 py-2 text-xs bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:border-gray-400 transition" placeholder="Ej. Juan Pérez">
                    </div>

                    <div class="space-y-2">
                        <label class="block text-xs font-medium text-gray-500 uppercase tracking-wider">Firma del Supervisor</label>
                        <div class="signature-pad-container">
                            <canvas id="signaturePadSupervisor" class="signature-pad"></canvas>
                        </div>
                        <div class="flex justify-end">
                            <button onclick="clearSignature('supervisor')" class="text-[10px] text-gray-400 hover:text-red-600 transition">Borrar firma</button>
                        </div>
                    </div>
                </div>

                <button onclick="saveBatchRecord()" class="w-full bg-primary text-white text-xs font-medium py-3 rounded-lg transition tracking-wide shadow-sm">
                    Guardar Registro Completo
                </button>
                <p id="formMessage" class="text-xs text-center font-medium"></p>
            </div>

            <div id="reportView" class="hidden space-y-6">
                <div>
                    <h2 class="text-xl font-light text-gray-800 tracking-tight">Historial de Registros</h2>
                    <p class="text-xs text-gray-400 mt-1">Listado de lotes locales guardados.</p>
                </div>

                <input type="text" id="searchFilter" onkeyup="renderRecordsList()" placeholder="Filtrar por nombre de material..." class="w-full px-4 py-2.5 text-xs bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:border-gray-400 transition">

                <div id="recordsListContainer" class="space-y-3">
                    </div>
            </div>

        </main>
    </div>

    <div id="validationModal" class="fixed inset-0 bg-black/20 backdrop-blur-sm hidden items-center justify-center p-4 z-50 transition-all">
        <div class="bg-white p-6 rounded-xl w-full max-w-sm border border-gray-100 shadow-xl space-y-4">
            <div>
                <h3 class="text-sm font-medium text-gray-800 uppercase tracking-wider">Validación de Lote</h3>
                <p class="text-xs text-gray-400 mt-0.5">Confirme la recepción conforme del registro.</p>
            </div>

            <div id="modalDetails" class="text-xs bg-gray-50 p-3 rounded-lg text-gray-600 space-y-1"></div>

            <div class="space-y-1">
                <label class="block text-[10px] font-medium text-gray-400 uppercase tracking-wider">Nombre del Validador</label>
                <input type="text" id="validatorName" class="w-full px-3 py-2 text-xs bg-gray-50 border border-gray-200 rounded-md focus:outline-none focus:border-gray-400 transition" placeholder="Ej. Francisco">
            </div>

            <div class="space-y-1">
                <label class="block text-[10px] font-medium text-gray-400 uppercase tracking-wider">Firma Autorizada</label>
                <div class="signature-pad-container">
                    <canvas id="signaturePadValidator" class="signature-pad"></canvas>
                </div>
                <div class="flex justify-end">
                    <button onclick="clearSignature('validator')" class="text-[10px] text-gray-400 hover:text-red-600 transition">Borrar firma</button>
                </div>
            </div>

            <div class="flex space-x-2 pt-2">
                <button onclick="closeModal()" class="flex-1 py-2 text-xs font-medium text-gray-500 bg-gray-100 hover:bg-gray-200 rounded-lg transition">Cancelar</button>
                <button onclick="submitValidation()" class="flex-1 py-2 text-xs font-medium text-white bg-emerald-600 hover:bg-emerald-700 rounded-lg transition">Aprobar y Firmar</button>
            </div>
        </div>
    </div>

    <div id="pdfContainer"></div>

    <div id="snackbar" class="fixed bottom-5 left-1/2 transform -translate-x-1/2 bg-gray-900 text-white text-xs px-4 py-2.5 rounded-full shadow-md opacity-0 transition-opacity duration-300 pointer-events-none z-50"></div>

    <script type="module">
        const { jsPDF } = window.jspdf;

        // --- Estado General ---
        let currentView = 'newRecord';
        let signaturePadSupervisor, signaturePadValidator;
        let selectedRecordId = null;
        const STORAGE_KEY = 'agrozzi_production_v2';

        // --- Inicialización ---
        window.startApp = () => {
            initSignaturePads();
            addMaterialRow(); // Iniciar con una fila vacía
            renderRecordsList();
        };

        const initSignaturePads = () => {
            const canvasSup = document.getElementById('signaturePadSupervisor');
            const canvasVal = document.getElementById('signaturePadValidator');
            signaturePadSupervisor = new SignaturePad(canvasSup);
            signaturePadValidator = new SignaturePad(canvasVal);

            const resizeCanvas = (pad) => {
                const canvas = pad.canvas;
                const ratio = Math.max(window.devicePixelRatio || 1, 1);
                canvas.width = canvas.offsetWidth * ratio;
                canvas.height = canvas.offsetHeight * ratio;
                canvas.getContext('2d').scale(ratio, ratio);
                pad.clear();
            };

            resizeCanvas(signaturePadSupervisor);
            window.addEventListener('resize', () => {
                resizeCanvas(signaturePadSupervisor);
                if (!document.getElementById('validationModal').classList.contains('hidden')) {
                    resizeCanvas(signaturePadValidator);
                }
            });
        };

        // --- Manejo de Vistas e Interfaz ---
        window.toggleView = () => {
            const navBtn = document.getElementById('navBtn');
            if (currentView === 'newRecord') {
                currentView = 'report';
                document.getElementById('newRecordView').classList.add('hidden');
                document.getElementById('reportView').classList.remove('hidden');
                navBtn.textContent = 'Nuevo Registro';
                renderRecordsList();
            } else {
                currentView = 'newRecord';
                document.getElementById('newRecordView').classList.remove('hidden');
                document.getElementById('reportView').classList.add('hidden');
                navBtn.textContent = 'Ver Reportes';
            }
        };

        window.clearSignature = (type) => {
            if (type === 'supervisor') signaturePadSupervisor.clear();
            if (type === 'validator') signaturePadValidator.clear();
        };

        const showSnackbar = (text) => {
            const bar = document.getElementById('snackbar');
            bar.textContent = text;
            bar.classList.remove('opacity-0');
            setTimeout(() => bar.classList.add('opacity-0'), 3500);
        };

        // --- Operaciones Dinámicas del Formulario ---
        let rowCounter = 0;
        window.addMaterialRow = () => {
            rowCounter++;
            const container = document.getElementById('materialsListContainer');
            
            const rowHtml = `
                <div id="row-${rowCounter}" class="p-4 border border-gray-100 rounded-xl bg-gray-50/50 space-y-3 relative group">
                    <button onclick="removeMaterialRow(${rowCounter})" class="absolute top-3 right-3 text-gray-300 hover:text-red-500 transition text-xs">✕</button>
                    
                    <div class="grid grid-cols-3 gap-2">
                        <div class="col-span-2 space-y-1">
                            <label class="block text-[10px] font-medium text-gray-400 uppercase tracking-wider">Material</label>
                            <input type="text" class="material-name w-full px-3 py-2 text-xs bg-white border border-gray-200 rounded-md focus:outline-none focus:border-gray-400 transition" placeholder="Nombre material">
                        </div>
                        <div class="space-y-1">
                            <label class="block text-[10px] font-medium text-gray-400 uppercase tracking-wider">Cant.</label>
                            <input type="number" class="material-qty w-full px-3 py-2 text-xs bg-white border border-gray-200 rounded-md focus:outline-none focus:border-gray-400 transition" placeholder="0">
                        </div>
                    </div>

                    <div class="flex items-center space-x-3 pt-1">
                        <label class="cursor-pointer bg-white border border-gray-200 text-gray-600 px-3 py-1.5 rounded-md text-[11px] font-medium hover:bg-gray-50 transition shadow-sm inline-flex items-center space-x-1">
                            <span>📸 Evidencia</span>
                            <input type="file" accept="image/*" capture="environment" class="hidden" onchange="processRowImage(event, ${rowCounter})">
                        </label>
                        <div id="preview-ctx-${rowCounter}" class="hidden items-center space-x-2">
                            <img id="img-preview-${rowCounter}" class="h-8 w-8 object-cover rounded border border-gray-200 shadow-sm">
                            <span class="text-[10px] text-gray-400">Imagen cargada</span>
                        </div>
                    </div>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', rowHtml);
        };

        window.removeMaterialRow = (id) => {
            const rows = document.querySelectorAll('.material-name');
            if (rows.length <= 1) {
                showSnackbar('El lote debe tener al menos un material.');
                return;
            }
            document.getElementById(`row-${id}`).remove();
        };

        // --- Compresión de Imágenes a Base64 ---
        window.processRowImage = (event, id) => {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_SIZE = 400; 
                    let w = img.width;
                    let h = img.height;

                    if (w > h) {
                        if (w > MAX_SIZE) { h *= MAX_SIZE / w; w = MAX_SIZE; }
                    } else {
                        if (h > MAX_SIZE) { w *= MAX_SIZE / h; h = MAX_SIZE; }
                    }

                    canvas.width = w;
                    canvas.height = h;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, w, h);

                    const compressedBase64 = canvas.toDataURL('image/jpeg', 0.4
                    ); 
                    
                    const previewImg = document.getElementById(`img-preview-${id}`);
                    const previewCtx = document.getElementById(`preview-ctx-${id}`);
                    previewImg.src = compressedBase64;
                    previewImg.dataset.base64 = compressedBase64; 
                    previewCtx.classList.replace('hidden', 'flex');
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        };

        // --- Persistencia de Datos (Local Storage) ---
        const getRecordsFromStorage = () => {
            const data = localStorage.getItem(STORAGE_KEY);
            return data ? JSON.parse(data) : [];
        };

        window.saveBatchRecord = () => {
            const msgEl = document.getElementById('formMessage');
            msgEl.className = "text-xs text-center font-medium text-red-500";
            
            const selectedSite = document.getElementById('siteSelector').value;
            const supervisorName = document.getElementById('supervisorNameInput').value.trim();
            const rows = document.querySelectorAll('[id^="row-"]');
            const items = [];
            let formValid = true;

            if (!selectedSite) {
                msgEl.textContent = 'Por favor seleccione el sitio donde se recibió.';
                return;
            }

            rows.forEach(row => {
                const materialName = row.querySelector('.material-name').value.trim();
                const materialQty = parseInt(row.querySelector('.material-qty').value, 10);
                const previewImg = row.querySelector('img[id^="img-preview-"]');
                const imageBase64 = previewImg ? previewImg.dataset.base64 : null;

                if (!materialName || isNaN(materialQty) || materialQty <= 0) {
                    formValid = false;
                    return;
                }

                items.push({
                    material: materialName,
                    cantidad: materialQty,
                    foto: imageBase64
                });
            });

            if (!formValid || items.length === 0) {
                msgEl.textContent = 'Por favor complete todos los nombres y cantidades de materiales.';
                return;
            }

            if (!supervisorName) {
                msgEl.textContent = 'Se requiere el nombre del supervisor para realizar la recepción.';
                return;
            }

            if (signaturePadSupervisor.isEmpty()) {
                msgEl.textContent = 'Se requiere la firma del supervisor para validar el lote.';
                return;
            }

            try {
                const records = getRecordsFromStorage();
                const newRecord = {
                    id: 'lote-' + Date.now(),
                    timestamp: new Date().toISOString(),
                    sitio: selectedSite,
                    supervisorName: supervisorName, // Nombre guardado correctamente
                    supervisorSig: signaturePadSupervisor.toDataURL(),
                    items: items,
                    isSigned: false,
                    validatorName: null,
                    validatorSig: null,
                    validationTimestamp: null
                };

                records.unshift(newRecord);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(records));

                // Limpieza del formulario
                document.getElementById('materialsListContainer').innerHTML = '';
                document.getElementById('siteSelector').value = ""; 
                document.getElementById('supervisorNameInput').value = ""; 
                signaturePadSupervisor.clear();
                addMaterialRow();
                
                msgEl.className = "text-xs text-center font-medium text-emerald-600";
                msgEl.textContent = 'Lote guardado localmente con éxito.';
                
                showSnackbar('Registro añadido al historial.');
                setTimeout(() => {
                    msgEl.textContent = '';
                    toggleView();
                }, 1000);

            } catch (e) {
                console.error(e);
                msgEl.textContent = 'Error de cuota superada. Borre registros antiguos.';
            }
        };

        // --- Renderizado de Historial ---
        window.renderRecordsList = () => {
            const container = document.getElementById('recordsListContainer');
            const query = document.getElementById('searchFilter').value.toLowerCase().trim();
            let records = getRecordsFromStorage();

            if (query) {
                records = records.filter(rec => 
                    rec.items.some(item => item.material.toLowerCase().includes(query))
                );
            }

            if (records.length === 0) {
                container.innerHTML = `<p class="text-xs text-center py-10 text-gray-400">No se encontraron registros.</p>`;
                return;
            }

            container.innerHTML = records.map(rec => {
                const date = new Date(rec.timestamp).toLocaleString('es-CL', { dateStyle: 'short', timeStyle: 'short' });
                const statusText = rec.isSigned ? 'Validado' : 'Pendiente';
                const statusColor = rec.isSigned ? 'text-emerald-600 bg-emerald-50' : 'text-amber-600 bg-amber-50';
                
                const itemsSummary = rec.items.map(i => `${i.material} (${i.cantidad})`).join(', ');
                const sitioText = rec.sitio || 'No especificado';
                const supervisorText = rec.supervisorName || 'No especificado';

                return `
                    <div class="p-4 border border-gray-100 rounded-xl bg-white shadow-sm space-y-3">
                        <div class="flex justify-between items-start">
                            <div>
                                <p class="text-xs font-semibold text-gray-700">${date}</p>
                                <p class="text-[10px] text-gray-500 font-medium">Sitio: ${sitioText} | Sup: ${supervisorText}</p>
                                <p class="text-[11px] text-gray-400 mt-1 truncate max-w-[220px]">${itemsSummary}</p>
                            </div>
                            <span class="text-[10px] font-medium px-2 py-0.5 rounded-full ${statusColor}">${statusText}</span>
                        </div>
                        <div class="flex justify-between items-center pt-2 border-t border-gray-50">
                            <button onclick="deleteRecord('${rec.id}')" class="text-[11px] text-gray-400 hover:text-red-600 transition">Eliminar</button>
                            <div class="flex space-x-2">
                                ${!rec.isSigned ? `<button onclick="openValidationModal('${rec.id}')" class="text-[11px] bg-gray-900 text-white px-3 py-1 rounded-md hover:bg-gray-800 transition">Firmar</button>` : ''}
                                <button onclick="generateCorporatePDF('${rec.id}')" class="text-[11px] border border-gray-200 text-gray-700 px-3 py-1 rounded-md hover:bg-gray-50 transition flex items-center space-x-0.5"><span>📄 PDF</span></button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        };

        window.deleteRecord = (id) => {
            if (!confirm('¿Seguro que desea remover este registro?')) return;
            let records = getRecordsFromStorage();
            records = records.filter(r => r.id !== id);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
            renderRecordsList();
            showSnackbar('Registro eliminado del dispositivo.');
        };

        // --- Lógica del Modal de Validación ---
        window.openValidationModal = (id) => {
            selectedRecordId = id;
            const records = getRecordsFromStorage();
            const rec = records.find(r => r.id === id);
            if (!rec) return;

            document.getElementById('modalDetails').innerHTML = `
                <p><strong>Fecha Lote:</strong> ${new Date(rec.timestamp).toLocaleString('es-CL')}</p>
                <p><strong>Sitio:</strong> ${rec.sitio || 'No especificado'}</p>
                <p><strong>Supervisor O.:</strong> ${rec.supervisorName || 'No especificado'}</p>
                <p><strong>Total ítems:</strong> ${rec.items.length} materiales listados</p>
            `;
            
            document.getElementById('validatorName').value = '';
            signaturePadValidator.clear();
            
            const modal = document.getElementById('validationModal');
            modal.classList.replace('hidden', 'flex');

            setTimeout(() => {
                const canvas = document.getElementById('signaturePadValidator');
                const ratio = Math.max(window.devicePixelRatio || 1, 1);
                canvas.width = canvas.offsetWidth * ratio;
                canvas.height = canvas.offsetHeight * ratio;
                canvas.getContext('2d').scale(ratio, ratio);
                signaturePadValidator.clear();
            }, 50);
        };

        window.closeModal = () => {
            document.getElementById('validationModal').classList.replace('flex', 'hidden');
            selectedRecordId = null;
        };

        window.submitValidation = () => {
            const name = document.getElementById('validatorName').value.trim();
            if (!name) { return alert('Ingrese el nombre de quien valida.'); }
            if (signaturePadValidator.isEmpty()) { return alert('Se requiere firma del validador.'); }

            let records = getRecordsFromStorage();
            const idx = records.findIndex(r => r.id === selectedRecordId);
            
            if (idx !== -1) {
                records[idx].isSigned = true;
                records[idx].validatorName = name;
                records[idx].validatorSig = signaturePadValidator.toDataURL();
                records[idx].validationTimestamp = new Date().toISOString();

                localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
                closeModal();
                renderRecordsList();
                showSnackbar('Lote verificado y firmado correctamente.');
            }
        };

        // --- DISEÑO Y ESTRUCTURACIÓN DEL PDF CORPORATIVO ---
        window.generateCorporatePDF = async (id) => {
            const records = getRecordsFromStorage();
            const rec = records.find(r => r.id === id);
            if (!rec) return showSnackbar('No se encontraron los datos del reporte.');

            showSnackbar('Estructurando PDF corporativo...');

            const dateLote = new Date(rec.timestamp).toLocaleString('es-CL');
            const dateVal = rec.validationTimestamp ? new Date(rec.validationTimestamp).toLocaleString('es-CL') : 'Pendiente';
            const sitioText = rec.sitio || 'No especificado';
            const supervisorText = rec.supervisorName || 'Supervisor General';

            // 1. Inyectar HTML estructurado formalmente
            const pdfContainer = document.getElementById('pdfContainer');
            pdfContainer.innerHTML = `
                <div style="padding: 35px; border: 1px solid #e5e7eb; min-height: 780px; display: flex; flex-direction: column; justify-content: space-between;">
                    
                    <div>
                        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #8a0007; padding-bottom: 12px; margin-bottom: 25px;">
                            <div>
                                <img src="https://agrozzi.cl/wp-content/uploads/2023/06/footer-19-06-1.png" style="height: 35px; width: auto; max-width: 150px;">
                            </div>
                            <div style="text-align: right;">
                                <h1 style="font-size: 14px; font-weight: bold; color: #111827; margin: 0; text-transform: uppercase; letter-spacing: 0.5px;">Ficha Control de Producción</h1>
                                <p style="font-size: 10px; color: #6b7280; margin: 2px 0 0 0;">ID Lote: ${rec.id}</p>
                            </div>
                        </div>

                        <div style="margin-bottom: 25px; font-size: 11px; color: #374151; line-height: 1.6;">
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                                <div>
                                    <strong>Planta / Origen:</strong> Planta Local (Agrozzi)<br>
                                    <strong>Sitio de Recepción:</strong> <span style="color: #111827; font-weight: 600;">${sitioText}</span>
                                </div>
                                <div>
                                    <strong>Fecha de Registro:</strong> ${dateLote}<br>
                                    <strong>Estado Actual:</strong> <span style="color: ${rec.isSigned ? '#059669' : '#d97706'}; font-weight: bold;">${rec.isSigned ? 'VALIDADO' : 'PENDIENTE'}</span>
                                </div>
                            </div>
                        </div>

                        <h2 style="font-size: 11px; text-transform: uppercase; tracking: 0.5px; color: #6b7280; margin-bottom: 8px; font-weight: bold;">Ítems Declarados</h2>
                        <table style="width: 100%; border-collapse: collapse; font-size: 11px; text-align: left; margin-bottom: 40px;">
                            <thead>
                                <tr style="background-color: #f9fafb; border-bottom: 1px solid #e5e7eb; color: #4b5563;">
                                    <th style="padding: 8px 10px; font-weight: 600; width: 45%;">Material</th>
                                    <th style="padding: 8px 10px; font-weight: 600; text-align: right; width: 20%;">Cantidad</th>
                                    <th style="padding: 8px 10px; font-weight: 600; text-align: center; width: 35%;">Evidencia Fotográfica</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${rec.items.map(item => `
                                    <tr style="border-bottom: 1px solid #f3f4f6; color: #1f2937;">
                                        <td style="padding: 10px; font-weight: 500;">${item.material}</td>
                                        <td style="padding: 10px; text-align: right; font-variant-numeric: tabular-nums;">${item.cantidad}</td>
                                        <td style="padding: 6px; text-align: center;">
                                            ${item.foto ? `<img src="${item.foto}" style="height: 48px; width: 48px; object-fit: cover; border-radius: 4px; border: 1px solid #e5e7eb;">` : `<span style="font-size: 10px; color: #9ca3af; font-style: italic;">Sin foto</span>`}
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>

                    <div style="margin-top: auto; padding-top: 20px; border-top: 1px solid #f3f4f6;">
                        <div style="display: flex; justify-content: space-between; align-items: flex-end;">
                            
                            <div style="width: 45%; text-align: center; font-size: 10px; color: #4b5563;">
                                <div style="min-height: 55px; display: flex; align-items: center; justify-content: center; margin-bottom: 5px;">
                                    <img src="${rec.supervisorSig}" style="max-height: 50px; max-width: 140px; object-fit: contain;">
                                </div>
                                <div style="border-top: 1px solid #d1d5db; padding-top: 4px;">
                                    <strong style="color: #1f2937;">${supervisorText}</strong><br>
                                    <span style="color: #9ca3af;">Supervisor de Turno</span>
                                </div>
                            </div>

                            <div style="width: 45%; text-align: center; font-size: 10px; color: #4b5563;">
                                <div style="min-height: 55px; display: flex; align-items: center; justify-content: center; margin-bottom: 5px;">
                                    ${rec.isSigned ? `<img src="${rec.validatorSig}" style="max-height: 50px; max-width: 140px; object-fit: contain;">` : `<div style="font-size: 9px; color: #dc2626; font-weight: 500; border: 1px dashed #fee2e2; padding: 4px 10px; background-color: #fef2f2; border-radius: 4px;">Firma Pendiente</div>`}
                                </div>
                                <div style="border-top: 1px solid #d1d5db; padding-top: 4px;">
                                    <strong style="color: #1f2937;">${rec.isSigned ? rec.validatorName : 'Validador Operaciones'}</strong><br>
                                    <span style="color: #9ca3af;">${rec.isSigned ? dateVal : 'Fecha por confirmar'}</span>
                                </div>
                            </div>

                        </div>
                        <div style="text-align: center; font-size: 9px; color: #9ca3af; margin-top: 35px;">
                            Documento interno confidencializado por validación local de dispositivos. Agrozzi S.A.
                        </div>
                    </div>

                </div>
            `;

            // 2. Renderizar a Canvas con html2canvas
            try {
                const canvas = await html2canvas(pdfContainer, {
                    scale: 1.5, 
                    useCORS: true,
                    logging: false
                });

                const imgData = canvas.toDataURL('image/png');
                
                // 3. Crear el documento PDF con jsPDF
                const pdf = new jsPDF({
                    orientation: 'portrait',
                    unit: 'px',
                    format: 'a4'
                });

                const pdfWidth = pdf.internal.pageSize.getWidth();
                const imgHeight = (canvas.height * pdfWidth) / canvas.width;

                pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, imgHeight);

                // 4. Descarga compatible universal (Blob)
                const blob = pdf.output('blob');
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.setAttribute("href", url);
                link.setAttribute("download", `Ficha_Producción_${supervisorText.replace(/\s+/g, '_')}_${rec.id}.pdf`);
                
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);

                showSnackbar('PDF descargado correctamente.');
                pdfContainer.innerHTML = ''; 
            } catch (err) {
                console.error(err);
                showSnackbar('Error al renderizar el archivo PDF.');
            }
        };
    </script>
</body>
</html>
